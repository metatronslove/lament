<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Lament Configuration - Hellraiser Puzzle Box 3D Viewer</title>
    
    <!-- Open Graph / Facebook / Discord / LinkedIn -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://[kullaniciadi].github.io/lament/">
    <meta property="og:title" content="Lament Configuration - 3D Puzzle Box">
    <meta property="og:description" content="Hellraiser filmindeki ikonik Lament Configuration kutusunun interaktif 3D görüntüleyicisi. STL dosyalarını keşfedin!">
    <meta property="og:image" content="https://[kullaniciadi].github.io/lament/docs/social-preview.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Lament Configuration - 3D Viewer">
    <meta name="twitter:description" content="Hellraiser kutusunun interaktif 3D modeli">
    <meta name="twitter:image" content="https://[kullaniciadi].github.io/lament/docs/social-preview.jpg">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            overflow: hidden;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* Ana görüntüleyici */
        #viewer-container {
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Sol kontrol paneli - mobilde otomatik gizlenen */
        #control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: min(300px, calc(100vw - 40px));
            max-height: calc(100vh - 100px);
            background: rgba(20, 20, 25, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 20px 16px;
            border: 1px solid rgba(180, 135, 20, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            z-index: 10;
            overflow-y: auto;
            transition: transform 0.3s ease, opacity 0.3s ease;
            pointer-events: auto;
        }

        /* Mobilde paneli gizleme butonu */
        #toggle-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 44px;
            height: 44px;
            background: rgba(20, 20, 25, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid #b8860b;
            border-radius: 12px;
            color: #b8860b;
            font-size: 24px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 15;
            transition: all 0.2s;
        }

        #toggle-panel:hover {
            background: #b8860b;
            color: #0a0a0a;
        }

        @media (max-width: 768px) {
            #control-panel {
                transform: translateX(-120%);
                opacity: 0;
                top: 80px;
            }
            #control-panel.visible {
                transform: translateX(0);
                opacity: 1;
            }
            #toggle-panel {
                display: flex;
            }
        }

        /* Başlık */
        .panel-header {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 12px;
        }

        .panel-header h1 {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 3px;
            color: #d4af37;
            text-shadow: 0 0 10px rgba(180, 135, 20, 0.3);
            margin-bottom: 4px;
        }

        .panel-header .subtitle {
            font-size: 0.8rem;
            color: #999;
            font-style: italic;
        }

        /* Form elemanları */
        .control-group {
            margin-bottom: 20px;
        }

        .control-label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 8px;
            border-left: 3px solid #b8860b;
            padding-left: 8px;
        }

        select, input[type="color"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #3a3a4a;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-appearance: none;
            appearance: none;
        }

        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2216%22%20height%3D%2216%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%23b8860b%22%3E%3Cpath%20d%3D%22M7%2010l5%205%205-5z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 20px;
        }

        select:hover, input[type="color"]:hover {
            border-color: #b8860b;
            background-color: rgba(30, 30, 40, 0.8);
        }

        /* Buton grid */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            padding: 12px 8px;
            background: rgba(30, 30, 40, 0.8);
            border: 1px solid #3a3a4a;
            color: #ddd;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn.active {
            background: #b8860b;
            border-color: #d4af37;
            color: #0a0a0a;
            box-shadow: 0 0 15px rgba(180, 135, 20, 0.5);
        }

        .btn:hover {
            border-color: #b8860b;
            background: rgba(50, 50, 65, 0.9);
        }

        /* Model bilgi kartı */
        .info-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 16px;
            margin: 20px 0;
            border: 1px solid #2a2a35;
            font-size: 0.9rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #333;
        }

        .info-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .info-label {
            color: #999;
        }

        .info-value {
            color: #d4af37;
            font-weight: 500;
        }

        #status {
            color: #b8860b;
            font-size: 0.8rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        /* Footer / Kaynaklar */
        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #666;
        }

        .footer-links a {
            color: #888;
            text-decoration: none;
            transition: color 0.2s;
            margin: 0 4px;
        }

        .footer-links a:hover {
            color: #b8860b;
            text-decoration: underline;
        }

        /* Buy Me A Coffee Widget Konteynırı */
        #bmc-widget {
            margin-top: 20px;
            display: flex;
            justify-content: center;
        }

        /* Sağ alt köşe bilgi */
        .corner-credit {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(4px);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 0.7rem;
            border: 1px solid #333;
            color: #999;
            z-index: 5;
            pointer-events: none;
        }

        .corner-credit i {
            color: #b8860b;
            margin-right: 4px;
        }

        /* Canvas'ın tıklanabilir olması önemli */
        canvas {
            display: block;
            outline: none;
        }
    </style>

    <!-- ViewSTL ve Three.js kütüphaneleri (yerel js/ klasöründen) -->
    <script src="js/three.min.js"></script>
    <script src="js/stl_viewer.min.js"></script>
    <script src="js/OrbitControls.js"></script>
    <script src="js/TrackballControls.js"></script>
    <script src="js/Projector.js"></script>
    <script src="js/CanvasRenderer.js"></script>
    <script src="js/webgl_detector.js"></script>
</head>
<body>
    <!-- Ana 3D Görüntüleyici Alanı -->
    <div id="viewer-container"></div>

    <!-- Mobil için panel açma/kapama butonu -->
    <div id="toggle-panel">☰</div>

    <!-- Sol Kontrol Paneli -->
    <div id="control-panel">
        <div class="panel-header">
            <h1>🔷 LAMENT CONFIGURATION</h1>
            <div class="subtitle">Hellraiser Puzzle Box - 3D Viewer</div>
        </div>

        <!-- Model Seçici -->
        <div class="control-group">
            <div class="control-label">📦 Model Seç</div>
            <select id="modelSelect">
                <option value="Lament_Configuration_Cube-3x3x3P.stl">Pozitif Küp (3x3x3P)</option>
                <option value="Lament_Configuration_Cube-3x3x3N.stl">Negatif Küp (3x3x3N)</option>
                <option value="Lament_Configuration_3x3x3_Positive.stl">3x3x3 Pozitif</option>
                <option value="Lament_Configuration_3x3x3_Negative.stl">3x3x3 Negatif</option>
                <option value="Lament_Configuration_3x3x3_Positive_A.stl" selected>Pozitif A (Önerilen)</option>
                <option value="Lament_Configuration_3x3x3_Positive_B.stl">Pozitif B</option>
            </select>
        </div>

        <!-- Renk Seçici -->
        <div class="control-group">
            <div class="control-label">🎨 Model Rengi</div>
            <input type="color" id="colorPicker" value="#b8860b">
        </div>

        <!-- Görünüm Modları -->
        <div class="control-group">
            <div class="control-label">👁️ Görünüm</div>
            <div class="button-grid">
                <button id="viewFlat" class="btn active">▣ Düz</button>
                <button id="viewSmooth" class="btn">⚪ Yumuşak</button>
                <button id="viewWireframe" class="btn">🕸️ Tel Kafes</button>
                <button id="toggleGrid" class="btn">📐 Izgara</button>
            </div>
        </div>

        <!-- Kontroller -->
        <div class="control-group">
            <div class="control-label">⚙️ Kontroller</div>
            <div class="button-grid">
                <button id="toggleRotate" class="btn">🔄 Oto Döndür</button>
                <button id="resetView" class="btn">⟲ Sıfırla</button>
            </div>
        </div>

        <!-- Model Bilgileri -->
        <div class="info-card">
            <div class="info-row">
                <span class="info-label">Aktif Model:</span>
                <span class="info-value" id="currentModelName">Pozitif A</span>
            </div>
            <div class="info-row">
                <span class="info-label">Durum:</span>
                <span class="info-value" id="status">Hazır</span>
            </div>
            <div class="info-row">
                <span class="info-label">Orijinal Tasarım:</span>
                <span class="info-value">Simon Sayce</span>
            </div>
        </div>

        <!-- Buy Me A Coffee Widget -->
        <div id="bmc-widget"></div>

        <!-- Kaynakça ve Bağlantılar -->
        <div class="footer-links">
            <a href="#" target="_blank" id="githubRepoLink">GitHub</a> •
            <a href="https://github.com/metatronslove/lament" target="_blank">Orijinal Model</a> •
            <a href="https://www.viewstl.com/plugin/" target="_blank">ViewSTL</a><br>
            <a href="https://buymeacoffee.com/metatronslove" target="_blank" style="color:#b8860b;">☕ Model Yaratıcısına Bağış Yap</a>
        </div>
    </div>

    <!-- Sağ alt köşe bilgi -->
    <div class="corner-credit">
        <i>🔷</i> Hellraiser Fan Project
    </div>

    <script>
        (function() {
            // --- KONFİGÜRASYON ---
            const container = document.getElementById('viewer-container');
            let viewer;
            let currentModelId = 0;
            let autoRotate = false;
            let gridVisible = false;

            // Model dosyaları ve görünen adları
            const modelFiles = [
                "Lament_Configuration_Cube-3x3x3P.stl",
                "Lament_Configuration_Cube-3x3x3N.stl",
                "Lament_Configuration_3x3x3_Positive.stl",
                "Lament_Configuration_3x3x3_Negative.stl",
                "Lament_Configuration_3x3x3_Positive_A.stl",
                "Lament_Configuration_3x3x3_Positive_B.stl"
            ];

            const modelDisplayNames = [
                "Pozitif Küp (3x3x3P)",
                "Negatif Küp (3x3x3N)",
                "3x3x3 Pozitif",
                "3x3x3 Negatif",
                "Pozitif A (Önerilen)",
                "Pozitif B"
            ];

            // --- VIEWER BAŞLATMA ---
            function initViewer() {
                try {
                    viewer = new StlViewer(container, {
                        bgcolor: "#0a0a0a",
                        canvas_width: "100%",
                        canvas_height: "100%",
                        auto_resize: true,
                        allow_drag_and_drop: false,
                        mouse_zoom: true,
                        load_three_files: false, // Kendimiz yükledik
                        models: []
                    });

                    viewer.set_grid(false);
                    
                    // Varsayılan model: Pozitif A (index 4)
                    loadModelByIndex(4);
                } catch (e) {
                    console.error("Viewer başlatılamadı:", e);
                    document.getElementById('status').innerText = 'Hata!';
                }
            }

            // --- MODEL YÜKLEME ---
            function loadModelByIndex(index) {
                if (!viewer) return;

                const filename = modelFiles[index];
                const displayName = modelDisplayNames[index];
                const colorVal = document.getElementById('colorPicker').value;

                try {
                    viewer.remove_model(0);
                } catch(e) { /* ilk seferde yoksa sorun değil */ }

                viewer.add_model({
                    id: 0,
                    filename: "models/" + filename,
                    color: colorVal,
                    display: 'flat',
                    rotationx: 0,
                    rotationy: 0,
                    rotationz: 0,
                    scale: 1.0
                });

                document.getElementById('currentModelName').innerText = displayName;
                document.getElementById('status').innerText = 'Yükleniyor...';

                // Model yüklendikten sonra durumu güncelle (gecikmeli)
                setTimeout(() => {
                    document.getElementById('status').innerText = 'Hazır';
                }, 800);
            }

            // --- OLAY DİNLEYİCİLERİ ---
            document.getElementById('modelSelect').addEventListener('change', function(e) {
                loadModelByIndex(e.target.selectedIndex);
            });

            document.getElementById('colorPicker').addEventListener('input', function(e) {
                if (viewer) viewer.set_color(0, e.target.value);
            });

            // Görünüm butonları
            document.getElementById('viewFlat').addEventListener('click', function() {
                if (!viewer) return;
                viewer.set_display(0, 'flat');
                [viewFlat, viewSmooth, viewWireframe].forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
            });

            document.getElementById('viewSmooth').addEventListener('click', function() {
                if (!viewer) return;
                viewer.set_display(0, 'smooth');
                [viewFlat, viewSmooth, viewWireframe].forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
            });

            document.getElementById('viewWireframe').addEventListener('click', function() {
                if (!viewer) return;
                viewer.set_display(0, 'wireframe');
                [viewFlat, viewSmooth, viewWireframe].forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
            });

            // Izgara
            document.getElementById('toggleGrid').addEventListener('click', function() {
                gridVisible = !gridVisible;
                viewer.set_grid(gridVisible, 100, 20);
                this.classList.toggle('active', gridVisible);
            });

            // Otomatik döndür
            document.getElementById('toggleRotate').addEventListener('click', function() {
                autoRotate = !autoRotate;
                viewer.set_auto_rotate(autoRotate);
                this.classList.toggle('active', autoRotate);
            });

            // Sıfırla
            document.getElementById('resetView').addEventListener('click', function() {
                if (!viewer) return;
                viewer.rotate(0, 0, 0, 0);
                viewer.set_auto_resize(true);
                window.dispatchEvent(new Event('resize'));
                
                // Izgara ve oto döndür varsayılan hallerine dön
                if (gridVisible) {
                    gridVisible = false;
                    viewer.set_grid(false);
                    document.getElementById('toggleGrid').classList.remove('active');
                }
                if (autoRotate) {
                    autoRotate = false;
                    viewer.set_auto_rotate(false);
                    document.getElementById('toggleRotate').classList.remove('active');
                }
            });

            // --- MOBİL PANEL KONTROLÜ ---
            const panel = document.getElementById('control-panel');
            const toggleBtn = document.getElementById('toggle-panel');

            toggleBtn.addEventListener('click', function() {
                panel.classList.toggle('visible');
                this.textContent = panel.classList.contains('visible') ? '✕' : '☰';
            });

            // Panel dışına tıklandığında kapat (mobil)
            document.addEventListener('click', function(event) {
                if (window.innerWidth <= 768) {
                    if (!panel.contains(event.target) && !toggleBtn.contains(event.target)) {
                        panel.classList.remove('visible');
                        toggleBtn.textContent = '☰';
                    }
                }
            });

            // --- BUY ME A COFFEE WIDGET (manuel) ---
            const bmcDiv = document.getElementById('bmc-widget');
            bmcDiv.innerHTML = `
                <a href="https://buymeacoffee.com/metatronslove" target="_blank" style="display: inline-block; background: #FFDD00; color: #000000; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; font-size: 14px; transition: all 0.2s;">
                    <span style="margin-right: 6px;">☕</span> Model Yaratıcısına Kahve Ismarla
                </a>
            `;

            // GitHub repo linkini dinamik yap (isteğe bağlı)
            document.getElementById('githubRepoLink').href = window.location.href;

            // Başlat
            window.onload = initViewer;
        })();
    </script>
</body>
</html>
