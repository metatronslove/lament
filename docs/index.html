    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #0a0a0a;
            color: #e0e0e0;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* Ana görüntüleyici */
        #viewer-container {
            width: 100vw;
            height: 100vh;
            background: #0a0a0a;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Sol kontrol paneli */
        #control-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: min(320px, calc(100vw - 40px));
            max-height: calc(100vh - 40px);
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 24px 20px;
            border: 1px solid rgba(180, 135, 20, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            z-index: 10;
            overflow-y: auto;
            pointer-events: auto;
            transition: transform 0.3s ease;
        }

        /* Mobil panel kontrolü */
        @media (max-width: 768px) {
            #control-panel {
                transform: translateX(-120%);
            }
            #control-panel.visible {
                transform: translateX(0);
            }
        }

        /* Başlık */
        .panel-header {
            text-align: center;
            margin-bottom: 24px;
            position: relative;
        }

        .panel-header h1 {
            font-size: 1.5rem;
            font-weight: 500;
            letter-spacing: 4px;
            color: #d4af37;
            text-shadow: 0 0 15px rgba(180, 135, 20, 0.5);
            margin-bottom: 8px;
            font-family: 'Times New Roman', serif;
        }

        .panel-header .subtitle {
            font-size: 0.75rem;
            color: #888;
            font-style: italic;
            letter-spacing: 2px;
        }

        .panel-header::before,
        .panel-header::after {
            content: "🔷";
            color: #b8860b;
            opacity: 0.5;
            margin: 0 10px;
        }

        /* Kontrol bölümleri */
        .control-section {
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #2a2a35;
        }

        .control-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #b8860b;
            margin-bottom: 16px;
            font-weight: 500;
        }

        /* Form elemanları */
        select, input[type="color"] {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #3a3a4a;
            border-radius: 16px;
            color: white;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-appearance: none;
            appearance: none;
            margin-bottom: 12px;
        }

        select {
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2216%22%20height%3D%2216%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22%23b8860b%22%3E%3Cpath%20d%3D%22M7%2010l5%205%205-5z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 16px center;
            background-size: 20px;
        }

        select:hover, input[type="color"]:hover {
            border-color: #b8860b;
            background: rgba(30, 30, 40, 0.9);
        }

        /* Buton grid */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .btn {
            padding: 14px 8px;
            background: rgba(30, 30, 40, 0.9);
            border: 1px solid #3a3a4a;
            color: #ddd;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
        }

        .btn.active {
            background: #b8860b;
            border-color: #d4af37;
            color: #0a0a0a;
            box-shadow: 0 0 20px rgba(180, 135, 20, 0.6);
        }

        .btn:hover {
            border-color: #b8860b;
            background: rgba(50, 50, 65, 0.9);
        }

        /* Bilgi paneli */
        .info-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 18px;
            padding: 18px;
            margin: 20px 0;
            border: 1px solid #2a2a35;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px dashed #333;
        }

        .info-row:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .info-label {
            color: #999;
            font-size: 0.85rem;
        }

        .info-value {
            color: #d4af37;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Yükleme çubuğu */
        .loading-container {
            margin: 15px 0;
        }

        .loading-bar {
            width: 100%;
            height: 4px;
            background: #2a2a35;
            border-radius: 4px;
            overflow: hidden;
        }

        .loading-progress {
            width: 0%;
            height: 100%;
            background: #b8860b;
            transition: width 0.3s ease;
        }

        .loading-text {
            text-align: center;
            font-size: 0.8rem;
            color: #b8860b;
            margin-top: 8px;
        }

        /* Mobil toggle butonu */
        #toggle-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 48px;
            height: 48px;
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(8px);
            border: 1px solid #b8860b;
            border-radius: 14px;
            color: #b8860b;
            font-size: 24px;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 15;
            transition: all 0.2s;
        }

        @media (max-width: 768px) {
            #toggle-panel {
                display: flex;
            }
        }

        /* Sağ alt bilgi - BMC ile çakışmaması için konumlandırıldı */
        .corner-credit {
            position: absolute;
            bottom: 80px;
            right: 20px;
            background: rgba(20, 20, 25, 0.7);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.7rem;
            border: 1px solid #333;
            color: #999;
            z-index: 5;
            pointer-events: none;
        }

        /* Footer bağlantılar */
        .footer-links {
            text-align: center;
            margin-top: 20px;
            font-size: 0.7rem;
            color: #666;
        }

        .footer-links a {
            color: #888;
            text-decoration: none;
            transition: color 0.2s;
            margin: 0 8px;
        }

        .footer-links a:hover {
            color: #b8860b;
        }

        /* BMC widget'ın doğru konumu için */
        .bmc-widget-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="viewer-container"></div>

    <div id="toggle-panel">☰</div>

    <div id="control-panel">
        <div class="panel-header">
            <h1>LAMENT CONFIGURATION</h1>
            <div class="subtitle">THE PUZZLE BOX</div>
        </div>

        <div class="control-section">
            <div class="section-title">📦 MODEL SEÇİMİ</div>
            <select id="modelSelect">
                <option value="models/Lament_Configuration_Cube-3x3x3P.stl">Pozitif Küp (3x3x3P)</option>
                <option value="models/Lament_Configuration_Cube-3x3x3N.stl">Negatif Küp (3x3x3N)</option>
                <option value="models/Lament_Configuration_3x3x3_Positive.stl">3x3x3 Pozitif</option>
                <option value="models/Lament_Configuration_3x3x3_Negative.stl">3x3x3 Negatif</option>
                <option value="models/Lament_Configuration_3x3x3_Positive_A.stl" selected>Pozitif A (Önerilen)</option>
                <option value="models/Lament_Configuration_3x3x3_Positive_B.stl">Pozitif B</option>
            </select>
            
            <div class="section-title" style="margin-top: 16px;">🎨 MODEL RENGİ</div>
            <input type="color" id="colorPicker" value="#b8860b">
        </div>

        <div class="control-section">
            <div class="section-title">👁️ GÖRÜNÜM MODLARI</div>
            <div class="button-grid">
                <button id="viewFlat" class="btn active">DÜZ</button>
                <button id="viewSmooth" class="btn">YUMUŞAK</button>
                <button id="viewWireframe" class="btn">TEL KAFES</button>
                <button id="toggleGrid" class="btn">IZGARA</button>
            </div>
        </div>

        <div class="control-section">
            <div class="section-title">⚙️ KONTROLLER</div>
            <div class="button-grid">
                <button id="toggleRotate" class="btn">OTOMATİK DÖNDÜR</button>
                <button id="resetView" class="btn">GÖRÜNÜMÜ SIFIRLA</button>
            </div>
        </div>

        <!-- Yükleme Durumu ve Bilgi -->
        <div class="info-panel">
            <div class="info-row">
                <span class="info-label">AKTİF MODEL:</span>
                <span class="info-value" id="currentModelName">Pozitif A</span>
            </div>
            
            <div class="loading-container">
                <div class="loading-bar">
                    <div class="loading-progress" id="loadingProgress"></div>
                </div>
                <div class="loading-text" id="status">HAZIR</div>
            </div>

            <div class="info-row">
                <span class="info-label">TASARIM:</span>
                <span class="info-value">Simon Sayce</span>
            </div>
            <div class="info-row">
                <span class="info-label">3D MODEL:</span>
                <span class="info-value">metatronslove</span>
            </div>
        </div>

        <!-- Kaynaklar -->
        <div class="footer-links">
            <a href="https://github.com/metatronslove/lament" target="_blank">ORİJİNAL REPO</a> •
            <a href="https://www.viewstl.com/plugin/" target="_blank">VIEWSTL</a> •
            <a href="https://threejs.org/" target="_blank">THREE.JS</a>
        </div>
    </div>

    <div class="corner-credit">
        <span>🔷 WE HAVE SUCH SIGHTS TO SHOW YOU</span>
    </div>

    <script>
        (function() {
            const container = document.getElementById('viewer-container');
            let viewer;
            let currentModelId = 0;
            let autoRotate = false;
            let gridVisible = false;

            const modelFiles = [
                "models/Lament_Configuration_Cube-3x3x3P.stl",
                "models/Lament_Configuration_Cube-3x3x3N.stl",
                "models/Lament_Configuration_3x3x3_Positive.stl",
                "models/Lament_Configuration_3x3x3_Negative.stl",
                "models/Lament_Configuration_3x3x3_Positive_A.stl",
                "models/Lament_Configuration_3x3x3_Positive_B.stl"
            ];

            const modelDisplayNames = [
                "Pozitif Küp (3x3x3P)",
                "Negatif Küp (3x3x3N)",
                "3x3x3 Pozitif",
                "3x3x3 Negatif",
                "Pozitif A",
                "Pozitif B"
            ];

            function initViewer() {
                try {
                    viewer = new StlViewer(container, {
                        bgcolor: "#0a0a0a",
                        canvas_width: "100%",
                        canvas_height: "100%",
                        auto_resize: true,
                        allow_drag_and_drop: false,
                        mouse_zoom: true,
                        load_three_files: false,
                        models: [],
                        all_loaded_callback: function() {
                            document.getElementById('status').innerText = 'HAZIR';
                            document.getElementById('loadingProgress').style.width = '100%';
                        },
                        loading_progress_callback: function(load_status, load_session) {
                            if (load_status && load_status.length > 0) {
                                const status = load_status[0];
                                if (status.total > 0) {
                                    const percent = (status.loaded / status.total) * 100;
                                    document.getElementById('loadingProgress').style.width = percent + '%';
                                    document.getElementById('status').innerText = 'YÜKLENİYOR... %' + Math.round(percent);
                                }
                            }
                        },
                        load_error_callback: function(error_str) {
                            document.getElementById('status').innerText = 'YÜKLEME HATASI!';
                            console.error('STL yükleme hatası:', error_str);
                        }
                    });

                    viewer.set_grid(false);
                    
                    setTimeout(() => {
                        loadModelByIndex(4);
                    }, 100);
                    
                } catch (e) {
                    console.error("Viewer başlatılamadı:", e);
                    document.getElementById('status').innerText = 'HATA!';
                }
            }

            function loadModelByIndex(index) {
                if (!viewer) return;

                const filename = modelFiles[index];
                const displayName = modelDisplayNames[index];
                const colorVal = document.getElementById('colorPicker').value;

                document.getElementById('loadingProgress').style.width = '0%';
                document.getElementById('status').innerText = 'YÜKLENİYOR... %0';

                try {
                    viewer.remove_model(0);
                } catch(e) {}

                viewer.add_model({
                    id: 0,
                    filename: filename,
                    color: colorVal,
                    display: 'flat',
                    rotationx: 0,
                    rotationy: 0,
                    rotationz: 0,
                    scale: 1.0
                });

                document.getElementById('currentModelName').innerText = displayName;
            }

            // Event Listeners
            document.getElementById('modelSelect').addEventListener('change', function(e) {
                loadModelByIndex(e.target.selectedIndex);
            });

            document.getElementById('colorPicker').addEventListener('input', function(e) {
                if (viewer) viewer.set_color(0, e.target.value);
            });

            document.getElementById('viewFlat').addEventListener('click', function() {
                if (!viewer) return;
                viewer.set_display(0, 'flat');
                document.querySelectorAll('#viewFlat, #viewSmooth, #viewWireframe').forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
            });

            document.getElementById('viewSmooth').addEventListener('click', function() {
                if (!viewer) return;
                viewer.set_display(0, 'smooth');
                document.querySelectorAll('#viewFlat, #viewSmooth, #viewWireframe').forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
            });

            document.getElementById('viewWireframe').addEventListener('click', function() {
                if (!viewer) return;
                viewer.set_display(0, 'wireframe');
                document.querySelectorAll('#viewFlat, #viewSmooth, #viewWireframe').forEach(btn => btn.classList.remove('active'));
                this.classList.add('active');
            });

            document.getElementById('toggleGrid').addEventListener('click', function() {
                gridVisible = !gridVisible;
                viewer.set_grid(gridVisible, 100, 20);
                this.classList.toggle('active', gridVisible);
            });

            document.getElementById('toggleRotate').addEventListener('click', function() {
                autoRotate = !autoRotate;
                viewer.set_auto_rotate(autoRotate);
                this.classList.toggle('active', autoRotate);
            });

            document.getElementById('resetView').addEventListener('click', function() {
                if (!viewer) return;
                viewer.rotate(0, 0, 0, 0);
                viewer.set_auto_resize(true);
                window.dispatchEvent(new Event('resize'));
            });

            // Mobile panel toggle
            const panel = document.getElementById('control-panel');
            const toggleBtn = document.getElementById('toggle-panel');
            
            toggleBtn.addEventListener('click', function() {
                panel.classList.toggle('visible');
                this.textContent = panel.classList.contains('visible') ? '✕' : '☰';
            });

            // Start viewer
            window.onload = initViewer;
        })();
    </script>
</body>
</html>
