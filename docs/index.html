<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lament Configuration - 3D Viewer</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>🔷</text></svg>">
    
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://metatronslove.github.io/lament/">
    <meta property="og:title" content="Lament Configuration - Hellraiser Puzzle Box">
    <meta property="og:description" content="Interactive 3D viewer for the Lament Configuration box from Hellraiser">
    <meta property="og:image" content="https://metatronslove.github.io/lament/docs/social-preview.jpg">
    
    <!-- ViewSTL için TÜM GEREKLİ DOSYALAR (doğru sırayla) -->
    <script src="js/three.min.js"></script>
    <script src="js/webgl_detector.js"></script>
    <script src="js/Projector.js"></script>
    <script src="js/CanvasRenderer.js"></script>
    <script src="js/OrbitControls.js"></script>
    <script src="js/TrackballControls.js"></script>
    <script src="js/stl_viewer.min.js"></script>
    <!-- NOT: load_stl.min.js Worker olduğu için script olarak eklenmez! -->
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Arial', sans-serif;
            background: #0a0a0a;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        
        #viewer-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 1;
        }
        
        /* Basit kontrol paneli */
        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 20, 0.9);
            border: 2px solid #b8860b;
            border-radius: 12px;
            padding: 15px;
            color: white;
            z-index: 10;
            width: 260px;
            backdrop-filter: blur(5px);
        }
        
        select, input[type="color"] {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            background: #333;
            border: 1px solid #b8860b;
            color: white;
            border-radius: 5px;
        }
        
        .btn-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            margin: 10px 0;
        }
        
        button {
            padding: 8px;
            background: #333;
            border: 1px solid #b8860b;
            color: #b8860b;
            border-radius: 5px;
            cursor: pointer;
        }
        
        button.active {
            background: #b8860b;
            color: black;
        }
        
        .info {
            margin-top: 10px;
            padding: 8px;
            background: #222;
            border-radius: 5px;
        }
        
        #bmc-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 20;
        }
        
        .signature {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #666;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div id="viewer-container"></div>
    
    <div id="controls">
        <h3 style="color: #b8860b; text-align: center;">🔷 LAMENT</h3>
        
        <select id="modelSelect">
            <option value="models/Lament_Configuration_Cube-3x3x3P.stl">Cube 3x3x3P</option>
            <option value="models/Lament_Configuration_Cube-3x3x3N.stl">Cube 3x3x3N</option>
            <option value="models/Lament_Configuration_3x3x3_Positive.stl">3x3x3 Positive</option>
            <option value="models/Lament_Configuration_3x3x3_Negative.stl">3x3x3 Negative</option>
            <option value="models/Lament_Configuration_3x3x3_Positive_A.stl" selected>Positive A</option>
            <option value="models/Lament_Configuration_3x3x3_Positive_B.stl">Positive B</option>
        </select>
        
        <input type="color" id="colorPicker" value="#b8860b">
        
        <div class="btn-group">
            <button id="viewFlat" class="active">FLAT</button>
            <button id="viewSmooth">SMOOTH</button>
            <button id="viewWireframe">WIRE</button>
            <button id="toggleRotate">ROTATE</button>
            <button id="toggleGrid">GRID</button>
            <button id="resetView">RESET</button>
        </div>
        
        <div class="info">
            <div style="display: flex; justify-content: space-between;">
                <span>Model:</span>
                <span id="currentModel">Positive A</span>
            </div>
            <div style="color: #b8860b; text-align: center; margin-top: 5px;" id="status">Ready</div>
        </div>
    </div>
    
    <div id="bmc-container">
        <script data-name="BMC-Widget" data-cfasync="false" src="https://cdnjs.buymeacoffee.com/1.0.0/widget.prod.min.js" data-id="metatronslove" data-description="Support me on Buy me a coffee!" data-color="#FFDD00" data-position="right" data-x_margin="18" data-y_margin="18"></script>
    </div>
    
    <div class="signature">metatronslove</div>
    
    <script>
        (function() {
            const container = document.getElementById('viewer-container');
            let viewer = null;
            
            const modelFiles = [
                "models/Lament_Configuration_Cube-3x3x3P.stl",
                "models/Lament_Configuration_Cube-3x3x3N.stl",
                "models/Lament_Configuration_3x3x3_Positive.stl",
                "models/Lament_Configuration_3x3x3_Negative.stl",
                "models/Lament_Configuration_3x3x3_Positive_A.stl",
                "models/Lament_Configuration_3x3x3_Positive_B.stl"
            ];
            
            function initViewer() {
                try {
                    console.log('Initializing viewer...');
                    
                    viewer = new StlViewer(container, {
                        bgcolor: "#0a0a0a",
                        auto_resize: true,
                        mouse_zoom: true,
                        allow_drag_and_drop: true,
                        
                        all_loaded_callback: function() {
                            document.getElementById('status').innerText = 'Ready';
                            console.log('Model loaded');
                        },
                        
                        load_error_callback: function(err) {
                            console.warn('Load error:', err);
                            document.getElementById('status').innerText = 'Error';
                        }
                    });
                    
                    // Varsayılan model
                    setTimeout(() => {
                        loadModel(4);
                    }, 500);
                    
                } catch (e) {
                    console.error('Viewer init error:', e);
                    document.getElementById('status').innerText = 'Init failed';
                }
            }
            
            function loadModel(index) {
                if (!viewer) return;
                
                const filename = modelFiles[index];
                const displayName = document.querySelectorAll('#modelSelect option')[index].text;
                
                document.getElementById('currentModel').innerText = displayName;
                document.getElementById('status').innerText = 'Loading...';
                
                try {
                    viewer.remove_model(0);
                } catch(e) {}
                
                viewer.add_model({
                    id: 0,
                    filename: filename,
                    color: document.getElementById('colorPicker').value,
                    display: 'flat'
                });
            }
            
            // Event listeners
            document.getElementById('modelSelect').addEventListener('change', function(e) {
                loadModel(e.target.selectedIndex);
            });
            
            document.getElementById('colorPicker').addEventListener('input', function(e) {
                if (viewer) {
                    try { viewer.set_color(0, e.target.value); } catch(e) {}
                }
            });
            
            document.getElementById('viewFlat').addEventListener('click', function() {
                if (!viewer) return;
                try { viewer.set_display(0, 'flat'); } catch(e) {}
                document.querySelectorAll('#viewFlat, #viewSmooth, #viewWireframe').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
            
            document.getElementById('viewSmooth').addEventListener('click', function() {
                if (!viewer) return;
                try { viewer.set_display(0, 'smooth'); } catch(e) {}
                document.querySelectorAll('#viewFlat, #viewSmooth, #viewWireframe').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
            
            document.getElementById('viewWireframe').addEventListener('click', function() {
                if (!viewer) return;
                try { viewer.set_display(0, 'wireframe'); } catch(e) {}
                document.querySelectorAll('#viewFlat, #viewSmooth, #viewWireframe').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
            
            let rotate = false;
            document.getElementById('toggleRotate').addEventListener('click', function() {
                if (!viewer) return;
                rotate = !rotate;
                try { viewer.set_auto_rotate(rotate); } catch(e) {}
                this.classList.toggle('active', rotate);
            });
            
            let grid = false;
            document.getElementById('toggleGrid').addEventListener('click', function() {
                if (!viewer) return;
                grid = !grid;
                try { viewer.set_grid(grid, 100, 10); } catch(e) {}
                this.classList.toggle('active', grid);
            });
            
            document.getElementById('resetView').addEventListener('click', function() {
                if (!viewer) return;
                try { viewer.set_auto_resize(true); } catch(e) {}
            });
            
            // Başlat
            initViewer();
        })();
    </script>
</body>
</html>
